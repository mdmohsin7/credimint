syntax = "proto3";
package credimint.credimint;

option go_package = "credimint/x/credimint/types";

message UserCredibility {
  uint64 id = 1;
  string address = 2; 
  uint64 minCollateralPercent = 3; 
  uint64 creditScore = 4; 
  uint64 riskLevel = 5; 
  string totalLent = 6; 
  string totalBorrowed = 7; 
  uint64 timesLent = 8; 
  uint64 timesBorrowed = 9; 
  repeated uint64 loansList = 10; 
  
}
